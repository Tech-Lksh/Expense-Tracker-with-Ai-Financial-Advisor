version: "3.9"

services:
  backend:
    build:
      context: .
      target: production
    container_name: expense-tracker-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/expense_tracker
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - expense-tracker-net

  mongo:
    image: mongo:7
    container_name: expense-tracker-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-tracker-net

  redis:
    image: redis:7-alpine
    container_name: expense-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-tracker-net

volumes:
  mongo-data:
  redis-data:

networks:
  expense-tracker-net:
    driver: bridge
